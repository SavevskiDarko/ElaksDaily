<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Centrala</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1E3A5F">
<link rel="apple-touch-icon" href="icon-192.png?v=3">
<link rel="icon" type="image/png" href="icon-192.png?v=3">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans+Condensed:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap&subset=cyrillic-ext" rel="stylesheet">
<style>
:root{
  --navy:#1E3A5F; --navy-deep:#152A46; --amber:#F5B301; --paper:#F7F8FA;
  --card:#FFFFFF; --ink:#23272E; --muted:#6B7280; --line:#E5E8EC;
  --work:#4C6EF5; --elaks:#1E3A5F; --personal:#2F9E68; --danger:#D6455D;
  --r:14px; --pad:16px;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
  --cond:'IBM Plex Sans Condensed',var(--sans);
  --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);font-size:15px;line-height:1.45;
  padding-bottom:calc(64px + env(safe-area-inset-bottom))}
button{font-family:inherit;font-size:inherit;border:0;background:none;cursor:pointer;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px;border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;width:100%;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--amber);outline-offset:1px}
label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:12px 0 4px;text-transform:uppercase;letter-spacing:.04em}

/* ---- top bar ---- */
.topbar{position:sticky;top:0;z-index:20;background:var(--navy);color:#fff;
  padding:calc(10px + env(safe-area-inset-top)) var(--pad) 10px;display:flex;align-items:baseline;gap:10px}
.topbar h1{font-family:var(--cond);font-weight:700;font-size:19px;letter-spacing:.02em}
.topbar .date{margin-left:auto;font-size:12.5px;opacity:.75;font-family:var(--mono)}

/* ---- tab bar ---- */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:20;background:var(--navy-deep);
  display:flex;padding-bottom:env(safe-area-inset-bottom)}
.tabbar button{flex:1;padding:9px 0 7px;color:#8DA2BC;font-family:var(--cond);font-weight:600;
  font-size:12px;letter-spacing:.05em;display:flex;flex-direction:column;align-items:center;gap:3px}
.tabbar button .led{width:5px;height:5px;border-radius:50%;background:transparent}
.tabbar button{position:relative}
.tabbar button.on{color:#fff}
.bdg{position:absolute;top:3px;right:calc(50% - 24px);background:var(--amber);color:var(--navy-deep);font-size:10px;font-weight:700;border-radius:999px;min-width:16px;height:16px;line-height:16px;padding:0 4px;display:none}
.bdg.on{display:block}
.tabbar button.on .led{background:var(--amber);box-shadow:0 0 6px var(--amber)}

/* ---- generic ---- */
.view{display:none;padding:var(--pad)}
.view.on{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.led{display:inline-block;width:9px;height:9px;border-radius:50%;flex:none}
.led.work{background:var(--work)} .led.elaks{background:var(--elaks)} .led.personal{background:var(--personal)}
.led.ok{background:var(--personal)} .led.low{background:var(--amber);box-shadow:0 0 5px var(--amber)}
.led.out{background:var(--danger);box-shadow:0 0 5px var(--danger)}
.led.draft{background:#9AA4B2} .led.sent{background:var(--work)} .led.accepted{background:var(--personal)} .led.rejected{background:var(--danger)}
.sec{font-family:var(--cond);font-weight:700;font-size:13px;letter-spacing:.07em;text-transform:uppercase;
  color:var(--muted);margin:18px 0 8px}
.muted{color:var(--muted);font-size:13px}
.mono{font-family:var(--mono)}
.row{display:flex;align-items:center;gap:10px}
.empty{color:var(--muted);text-align:center;padding:30px 10px;font-size:14px}
.chips{display:flex;gap:8px;flex-wrap:wrap;overflow-x:auto;padding-bottom:2px}
.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 13px;font-size:13.5px;font-weight:500;white-space:nowrap}
.chip.on{background:var(--navy);border-color:var(--navy);color:#fff}
.btn{background:var(--navy);color:#fff;border-radius:11px;padding:12px 16px;font-weight:600;width:100%;margin-top:14px}
.btn.amber{background:var(--amber);color:var(--navy-deep)}
.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
.btn.danger{background:var(--danger)}
.btn.sm{width:auto;padding:8px 13px;margin:0;font-size:13.5px;border-radius:9px}
.fab{position:fixed;right:18px;bottom:calc(78px + env(safe-area-inset-bottom));z-index:19;
  width:56px;height:56px;border-radius:50%;background:var(--amber);color:var(--navy-deep);
  font-size:30px;font-weight:600;box-shadow:0 4px 14px rgba(30,58,95,.35);display:none;align-items:center;justify-content:center;line-height:1}
.fab.on{display:flex}

/* ---- sheet ---- */
.overlay{position:fixed;inset:0;background:rgba(21,42,70,.45);z-index:30;display:none}
.overlay.on{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:31;background:var(--paper);
  border-radius:18px 18px 0 0;max-height:88vh;overflow-y:auto;padding:14px var(--pad) calc(20px + env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .22s ease;display:none}
.sheet.on{display:block;transform:translateY(0)}
@media (prefers-reduced-motion:reduce){.sheet{transition:none}}
.sheet h2{font-family:var(--cond);font-weight:700;font-size:17px;margin-bottom:4px}
.grab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ---- tasks ---- */
.task{display:flex;align-items:center;gap:11px}
.task .tick{width:24px;height:24px;border-radius:8px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}
.task.done .tick{background:var(--personal);border-color:var(--personal)}
.task.done .t-title{text-decoration:line-through;color:var(--muted)}
.task .t-title{flex:1;font-weight:500}
.task .t-time{font-family:var(--mono);font-size:12.5px;color:var(--muted)}
.task .rec{font-size:11px;color:var(--muted)}

/* ---- inventory ---- */
.art{display:flex;align-items:center;gap:11px}
.art .a-name{flex:1;min-width:0}
.art .a-name b{font-weight:600;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.art .a-name span{font-size:12px;color:var(--muted)}
.art .a-qty{font-family:var(--mono);font-weight:600;font-size:16px;text-align:right}
.art .a-qty small{display:block;font-size:10.5px;color:var(--muted);font-weight:500}
.mov{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;border-bottom:1px solid var(--line)}
.mov:last-child{border:0}

/* ---- offers ---- */
.offer .o-num{font-family:var(--mono);font-size:12.5px;color:var(--muted)}
.offer .o-total{font-family:var(--mono);font-weight:600;white-space:nowrap}
.oitem{display:grid;grid-template-columns:1fr 58px 74px 74px 28px;gap:6px;align-items:center;margin-bottom:6px;font-size:13.5px}
.oitem input{padding:7px 8px;font-size:14px}
.oitem .del{color:var(--danger);font-size:18px;text-align:center}
.ohead{display:grid;grid-template-columns:1fr 58px 74px 74px 28px;gap:6px;font-size:11px;color:var(--muted);
  text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-bottom:4px}
.totalbar{display:flex;justify-content:space-between;align-items:center;background:var(--navy);color:#fff;
  border-radius:11px;padding:11px 14px;margin-top:10px;font-weight:600}
.totalbar .mono{color:var(--amber);font-size:17px}

/* ---- login ---- */
#login{max-width:360px;margin:16vh auto 0;padding:0 var(--pad)}
#login .logo{width:64px;height:64px;border-radius:16px;margin-bottom:16px}
.toast{position:fixed;left:50%;bottom:calc(84px + env(safe-area-inset-bottom));transform:translateX(-50%);
  background:var(--navy-deep);color:#fff;padding:10px 18px;border-radius:999px;font-size:13.5px;z-index:40;
  opacity:0;pointer-events:none;transition:opacity .2s}
.toast.on{opacity:1}
.search{margin-bottom:10px}
@media (prefers-color-scheme: dark){
  :root{--paper:#12161C;--card:#1A202A;--ink:#E7EAF0;--line:#2A3242;--muted:#95A1B5}
  .chip{background:var(--card);color:var(--ink)}
  input,select,textarea{background:var(--card);color:var(--ink)}
  .btn.ghost{background:var(--card);color:var(--ink)}
  .task .tick{border-color:#39424F}
}
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="login" style="display:none">
  <img src="icon-192.png?v=3" class="logo" alt="">
  <h1 style="font-family:var(--cond);font-size:24px;margin-bottom:2px">Centrala</h1>
  <p class="muted" style="margin-bottom:18px">Tasks · Stock · Offers</p>
  <label>Email</label><input id="lg-email" type="email" autocomplete="username">
  <label>Password</label><input id="lg-pass" type="password" autocomplete="current-password">
  <button class="btn" onclick="login()">Sign in</button>
  <p id="lg-err" class="muted" style="color:var(--danger);margin-top:10px"></p>
</div>

<!-- ================= APP ================= -->
<div id="app" style="display:none">
  <div class="topbar"><h1 id="bar-title">Today</h1><span class="date" id="bar-date"></span></div>

  <!-- TODAY -->
  <div class="view" id="v-today">
    <input class="search" id="qc" placeholder="Quick add: Order cameras tomorrow 14:00 #elaks" onkeydown="qcKey(event)">
    <div class="chips" id="ctx-filter" style="margin-bottom:12px"></div>
    <div id="today-list"></div>
    <div class="sec">Next 7 days</div>
    <div id="week-list"></div>
    <button class="btn ghost" onclick="openHistory()">Completed tasks →</button>
  </div>

  <!-- STOCK -->
  <div class="view" id="v-inv">
    <input class="search" id="inv-search" placeholder="Search article…" oninput="renderInv()">
    <div class="chips" id="cat-filter" style="margin-bottom:12px"></div>
    <div id="inv-list"></div>
  </div>

  <!-- OFFERS -->
  <div class="view" id="v-off">
    <input class="search" id="off-search" placeholder="Search offers…" oninput="renderOffers()">
    <div class="chips" id="off-filter" style="margin-bottom:12px"></div>
    <div id="off-list"></div>
  </div>

  <!-- SETTINGS -->
  <div class="view" id="v-set">
    <div class="sec">Notifications</div>
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <div><b>Push notifications</b><div class="muted" id="push-state">—</div></div>
        <button class="btn sm amber" onclick="enablePush()">Enable</button>
      </div>
      <div id="digest-block">
        <label>Daily digest at</label>
        <div class="row"><input id="digest-hour" type="time" value="07:30" style="flex:1">
          <button class="btn sm" onclick="saveDigestHour()">Save</button></div>
      </div>
    </div>
    <div class="sec">Clients</div>
    <div id="cli-list"></div>
    <button class="btn ghost" onclick="openClientSheet()">+ New client</button>
    <div class="sec">Export (CSV)</div>
    <div class="grid2">
      <button class="btn sm ghost" style="width:100%" onclick="exportCsv('articles')">Articles</button>
      <button class="btn sm ghost" style="width:100%" onclick="exportCsv('movements')">Movements</button>
    </div>
    <button class="btn ghost" onclick="exportCsv('offers')">Offers</button>
    <div class="sec">Account</div>
    <button class="btn ghost" onclick="logout()">Sign out</button>
    <p class="muted" style="margin-top:14px">Centrala · version 1.2</p>
  </div>

  <button class="fab" id="fab" onclick="fabClick()">+</button>

  <div class="tabbar">
    <button data-tab="today" class="on" onclick="tab('today')"><span class="led"></span>Today<span class="bdg" id="bdg-today"></span></button>
    <button data-tab="inv" onclick="tab('inv')"><span class="led"></span>Stock<span class="bdg" id="bdg-inv"></span></button>
    <button data-tab="off" onclick="tab('off')"><span class="led"></span>Offers</button>
    <button data-tab="set" onclick="tab('set')"><span class="led"></span>Settings</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pizzip@3.2.0/dist/pizzip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.69.0/build/docxtemplater.min.js"></script>
<script>
/* ============================================================
   CONFIG — fill in these 3 values (see SETUP.md)
============================================================ */
const CONFIG = {
  SUPABASE_URL: "https://inbxjztezjfrbnidzofy.supabase.co",
  SUPABASE_ANON_KEY: "sb_publishable_lQGHqzhlV4W-bG-ibbm3UA_A3aPkMv5",
  VAPID_PUBLIC_KEY: "BJQKgmv3uL5mCYXBrzMW6OzPDiA-UCCP6_00bkv5pHP0PWRCSxysBlxGyTMESMrP1cn8nHq7wxW1oItsnMMuMeU",
};

const db = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
const $ = (id) => document.getElementById(id);
const CTX = { work: "Work", elaks: "Elaks", personal: "Personal" };
const CATS = ["CCTV", "DVR", "Alarm", "Access", "Cables", "Other"];
const STATUS = { draft: "Draft", sent: "Sent", accepted: "Accepted", rejected: "Rejected" };
const unitLbl = (u) => u === "m" ? "m" : "pcs";
const fmt = (n) => (Math.round(n * 100) / 100).toLocaleString("mk-MK");
const todayStr = () => new Date().toLocaleDateString("sv-SE"); // YYYY-MM-DD local
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

let state = { tab: "today", ctxFilter: "all", catFilter: "all", offStatus: "all", role: "owner", uid: null, tasks: [], stock: [], clients: [], offers: [] };

async function dbq(q, failMsg) {
  const { data, error } = await q;
  if (error) { console.error(error); toast((failMsg || "Not saved") + " — " + error.message); throw error; }
  return data;
}

/* ---------------- AUTH ---------------- */
async function boot() {
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
  const { data: { session } } = await db.auth.getSession();
  if (session) startApp(); else $("login").style.display = "block";
}
async function login() {
  const { error } = await db.auth.signInWithPassword({ email: $("lg-email").value.trim(), password: $("lg-pass").value });
  if (error) { $("lg-err").textContent = "Wrong email or password."; return; }
  $("login").style.display = "none"; startApp();
}
async function logout() { await db.auth.signOut(); location.reload(); }

async function startApp() {
  $("app").style.display = "block";
  $("bar-date").textContent = new Date().toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" });
  try {
    const { data: { user } } = await db.auth.getUser();
    state.uid = user ? user.id : null;
    if (user) {
      const { data: r } = await db.from("user_roles").select("role").eq("user_id", user.id).maybeSingle();
      if (r && r.role) state.role = r.role;
    }
  } catch (e) { console.warn("role lookup", e); }
  await refreshAll();
  tab("today");
  updatePushState();
  if (state.role === "owner") {
    const { data } = await db.from("app_settings").select("value").eq("key", "digest_hour").maybeSingle();
    if (data) $("digest-hour").value = String(data.value).replace(/"/g, "");
  } else if ($("digest-block")) $("digest-block").style.display = "none";
}

async function refreshAll() {
  const [t, s, c, o] = await Promise.all([
    db.from("tasks").select("*").order("due_time", { ascending: true, nullsFirst: false }),
    db.from("article_stock").select("*").eq("active", true).order("name"),
    db.from("clients").select("*").order("name"),
    db.from("offers").select("*, clients(name)").order("created_at", { ascending: false }),
  ]);
  state.tasks = t.data ?? []; state.stock = s.data ?? [];
  state.clients = c.data ?? []; state.offers = o.data ?? [];
}

/* ---------------- NAV ---------------- */
function tab(name) {
  state.tab = name;
  document.querySelectorAll(".view").forEach((v) => v.classList.remove("on"));
  $("v-" + { today: "today", inv: "inv", off: "off", set: "set" }[name]).classList.add("on");
  document.querySelectorAll(".tabbar button").forEach((b) => b.classList.toggle("on", b.dataset.tab === name));
  $("bar-title").textContent = { today: "Today", inv: "Stock", off: "Offers", set: "Settings" }[name];
  $("fab").classList.toggle("on", ["today", "inv", "off"].includes(name));
  render();
}
function fabClick() {
  if (state.tab === "today") openTaskSheet();
  else if (state.tab === "inv") openArticleSheet();
  else if (state.tab === "off") openOfferSheet();
}
function render() {
  updateBadges();
  if (state.tab === "today") renderToday();
  if (state.tab === "inv") renderInv();
  if (state.tab === "off") renderOffers();
  if (state.tab === "set") renderClients();
}
function toast(msg) { const t = $("toast"); t.textContent = msg; t.classList.add("on"); setTimeout(() => t.classList.remove("on"), 2200); }
function openSheet(html) { $("sheet").innerHTML = '<div class="grab"></div>' + html; $("overlay").classList.add("on"); requestAnimationFrame(() => $("sheet").classList.add("on")); $("sheet").style.display = "block"; }
function closeSheet() { $("sheet").classList.remove("on"); $("overlay").classList.remove("on"); setTimeout(() => { $("sheet").style.display = "none"; }, 220); }

/* ============================================================
   TASKS
============================================================ */
function occursOn(t, dateStr) {
  const d = new Date(dateStr + "T12:00");
  if (t.recurrence === "daily") return true;
  if (t.recurrence === "weekly") return t.recur_dow === d.getDay();
  if (t.recurrence === "monthly") return t.recur_dom === d.getDate();
  return t.due_date === dateStr;
}
function isDoneOn(t, dateStr) { return t.recurrence ? t.last_done === dateStr : t.done; }

function renderToday() {
  const today = todayStr();
  $("ctx-filter").innerHTML = (state.role === "owner" ? ["all", "work", "elaks", "personal"] : []).map((c) =>
    `<button class="chip ${state.ctxFilter === c ? "on" : ""}" onclick="state.ctxFilter='${c}';renderToday()">${c === "all" ? "All" : CTX[c]}</button>`).join("");
  const vis = (t) => state.ctxFilter === "all" || t.context === state.ctxFilter;

  const overdue = state.tasks.filter((t) => vis(t) && !t.recurrence && t.due_date && t.due_date < today && !t.done);
  const todays = state.tasks.filter((t) => vis(t) && occursOn(t, today));

  const inbox = state.tasks.filter((t) => vis(t) && !t.recurrence && !t.due_date && !t.done);
  let html = "";
  if (overdue.length) {
    html += '<div class="sec" style="color:var(--danger)">Overdue</div>' + overdue.map(taskRow(today)).join("");
  }
  if (inbox.length) html += '<div class="sec">No date</div>' + inbox.map(taskRow(today)).join("");
  html += todays.length ? todays.map(taskRow(today)).join("")
    : ((overdue.length || inbox.length) ? "" : '<div class="empty">No tasks for today.<br>Add with +</div>');
  $("today-list").innerHTML = html;

  // week
  let week = "";
  for (let i = 1; i <= 7; i++) {
    const d = new Date(); d.setDate(d.getDate() + i);
    const ds = d.toLocaleDateString("sv-SE");
    const list = state.tasks.filter((t) => vis(t) && occursOn(t, ds));
    if (!list.length) continue;
    week += `<div class="sec">${d.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "short" })}</div>` +
      list.map((t) => `<div class="card task" onclick="openTaskSheet('${t.id}')"><span class="led ${t.context}"></span><span class="t-title">${esc(t.title)}</span>
        ${t.due_time ? `<span class="t-time">${t.due_time.slice(0, 5)}</span>` : ""}</div>`).join("");
  }
  $("week-list").innerHTML = week || '<div class="empty">Nothing scheduled.</div>';
}
const taskRow = (today) => (t) => {
  const done = isDoneOn(t, today);
  return `<div class="card task ${done ? "done" : ""}">
    <button class="tick" onclick="toggleTask('${t.id}')" aria-label="done">${done ? "✓" : ""}</button>
    <span class="led ${t.context}"></span>
    <span class="t-title" onclick="openTaskSheet('${t.id}')">${esc(t.title)}
      ${t.recurrence ? '<span class="rec"> ↻</span>' : ""}</span>
    ${t.due_time ? `<span class="t-time">${t.due_time.slice(0, 5)}</span>` : ""}
  </div>`;
};
async function toggleTask(id) {
  const t = state.tasks.find((x) => x.id === id); const today = todayStr();
  const upd = t.recurrence
    ? { last_done: t.last_done === today ? null : today }
    : { done: !t.done, last_done: !t.done ? today : null };
  try { await dbq(db.from("tasks").update(upd).eq("id", id), "Not updated"); } catch { return; }
  Object.assign(t, upd); renderToday(); updateBadges();
}
function openTaskSheet(id) {
  const t = id ? state.tasks.find((x) => x.id === id) : { context: state.role === "employee" ? "elaks" : "work", due_date: todayStr() };
  openSheet(`
    <h2>${id ? "Edit task" : "New task"}</h2>
    <label>Title</label><input id="tk-title" value="${esc(t.title || "")}" placeholder="e.g. Standup · Order cameras">
    <label>Context</label>

function openHistory() {
  const done = state.tasks.filter((t) => !t.recurrence && t.done)
    .sort((a, b) => (b.last_done || "").localeCompare(a.last_done || ""));
  const fmtD = (d) => d ? new Date(d + "T12:00").toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short", year: "numeric" }) : "Earlier";
  let html = `<h2>Completed tasks</h2>`;

  let lastD = null;
  for (const t of done.slice(0, 300)) {

    html += `<div class="card task done">

  const noteEl = $("of-note");
  if (noteEl && !noteEl.dataset.manual) {
    noteEl.value = metersOpen.length ? "(не се вклучени " + metersOpen.map((m) => m.name.split(" ")[0].toLowerCase()).join(" и ") + ")" : "";
  }
  return sum;
}
async function saveOffer(id, generate) {
  const meters = offerItems.map((it, i) => ({ it, n: i + 1 })).filter((x) => x.it.unit === "m");
  const row = {
    number: id ? state.offers.find((x) => x.id === id).number : nextOfferNumber(),
    title: $("of-title").value.trim(), system: $("of-system").value.trim() || null,
    client_id: $("of-client").value || null, offer_date: $("of-date").value,
    validity: parseInt($("of-val").value) || 7, status: $("of-status").value,
    items: offerItems, total_note: $("of-note").value.trim() || null,
    grand_total: updateTotal(),
  };
  if (!row.title) return toast("Enter a title");
  if (!offerItems.length) return toast("Add items");
  let saved;
  try {
    if (id) { await dbq(db.from("offers").update(row).eq("id", id), "Offer not saved"); saved = { ...row, id }; }
    else {
      let ins = await db.from("offers").insert(row).select().single();
      if (ins.error && ins.error.code === "23505") {   // number collision → refresh, renumber, retry once
        await refreshAll(); row.number = nextOfferNumber();
        ins = await db.from("offers").insert(row).select().single();
      }
      if (ins.error) { toast("Offer not saved — " + ins.error.message); return; }
      saved = ins.data;
    }
  } catch { return; }
  await refreshAll();
  let genOk = null;
  if (generate) genOk = await generateDocx(saved);
  closeSheet(); renderOffers();
  toast(genOk === false ? "Offer saved — document failed" : genOk ? "Offer saved · downloading .docx" : "Offer saved");
}
async function generateDocx(o) {
  const metersOpen = (o.items || []).map((it, i) => ({ it, n: i + 1 })).filter((x) => x.it.unit === "m" && !x.it.consumed);
  try {
    if (!window.PizZip || !window.docxtemplater) throw new Error("Document libraries did not load — check connection and reload the app");
    const res = await fetch("Ponuda_TEMPLATE.docx", { cache: "no-store" });
    if (!res.ok) throw new Error("Template not found on server (HTTP " + res.status + ")");
    const buf = await res.arrayBuffer();
    const head = new Uint8Array(buf.slice(0, 2));
    if (head[0] !== 0x50 || head[1] !== 0x4B) throw new Error("Template file on server is not a valid .docx");
    const doc = new window.docxtemplater(new PizZip(buf), { linebreaks: true, paragraphLoop: true });
    const client = state.clients.find((c) => c.id === o.client_id);
    doc.render({
      title: o.title, system: o.system || "",
      offer_number: o.number, date: new Date(o.offer_date).toLocaleDateString("mk-MK"),
      client: client ? client.name : "", validity: o.validity,
      items: o.items.map((it, i) => ({
        num: i + 1, name: it.name, specs: it.specs || "",
        qty: it.unit === "m" ? (it.consumed ? fmt(it.consumed) + " m" : "m") : (it.free ? "" : fmt(it.qty || 0)),
        price: it.free ? "" : fmt(it.price || 0),
        total: itemTotal(it) === null ? "???" : fmt(itemTotal(it) || 0),
      })),
      total_note: o.total_note || "", grand_total: fmt(o.grand_total),
      footnote: metersOpen.length
        ? `* Ставките ${metersOpen.map((m) => m.n).join(" и ")} се пресметуваат по потрошена должина по завршување на монтажата.`
        : "",
    });
    const blob = doc.getZip().generate({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `Ponuda_${o.number}.docx`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 4000);
    return true;
  } catch (e) {
    console.error(e);
    const det = (e.properties && e.properties.errors)
      ? e.properties.errors.map((x) => x.properties && x.properties.explanation).filter(Boolean).join("\n")
      : e.message;
    alert("Could not generate the offer document:\n\n" + det);
    return false;
  }
}
async function deductStock(id) {
  if (!confirm("Deduct all piece items of this offer from stock?")) return;
  const o = state.offers.find((x) => x.id === id);
  const rows = o.items.filter((it) => it.article_id && it.unit !== "m")
    .map((it) => ({ article_id: it.article_id, type: "out", qty: it.qty || 0, ref: o.number, note: "Offer " + o.number }));
  try {
    if (rows.length) await dbq(db.from("movements").insert(rows), "Stock not updated");
    await dbq(db.from("offers").update({ stock_deducted: true }).eq("id", id), "Offer not updated");
  } catch { return; }
  closeSheet(); await refreshAll(); renderOffers(); toast("Deducted from stock");
}
async function delOffer(id) {
  if (!confirm("Delete this offer?")) return;
  try { await dbq(db.from("offers").delete().eq("id", id), "Not deleted"); } catch { return; }
  closeSheet(); await refreshAll(); renderOffers();
}
function duplicateOffer(id) {
  const src = state.offers.find((x) => x.id === id);
  closeSheet();
  setTimeout(() => {
    openOfferSheet();
    $("of-title").value = src.title; $("of-system").value = src.system || "";
    $("of-client").value = src.client_id || ""; $("of-val").value = src.validity;
    offerItems = JSON.parse(JSON.stringify(src.items || [])).map((it) => { delete it.consumed; return it; });
    renderOfferItems();
  }, 240);
}
function closeJobSheet(id) {
  const o = state.offers.find((x) => x.id === id);
  const ms = o.items.map((it, i) => ({ it, i })).filter((x) => x.it.unit === "m" && !x.it.consumed);
  openSheet(`
    <h2>Close job — ${o.number}</h2>
    <p class="muted">Enter consumed length per item. The offer total and stock will be updated.</p>
    ${ms.map((x) => `<label>${esc(x.it.name)} (@ ${fmt(x.it.price || 0)} /m)</label>
      <input type="number" inputmode="decimal" min="0" step="any" id="cj-${x.i}">`).join("")}
    <button class="btn" onclick="closeJob('${id}')">Confirm — update offer & stock</button>
  `);
}
async function closeJob(id) {
  const o = state.offers.find((x) => x.id === id);
  const items = JSON.parse(JSON.stringify(o.items));
  const movRows = [];
  for (let i = 0; i < items.length; i++) {
    const it = items[i];
    if (it.unit === "m" && !it.consumed) {
      const v = parseFloat(($("cj-" + i) || {}).value);
      if (!v || v <= 0) return toast("Enter meters for every item");
      it.consumed = v;
      if (it.article_id) movRows.push({ article_id: it.article_id, type: "out", qty: v, ref: o.number, note: "Offer " + o.number });
    }
  }
  if (!o.stock_deducted) items.forEach((it) => {
    if (it.article_id && it.unit !== "m") movRows.push({ article_id: it.article_id, type: "out", qty: it.qty || 0, ref: o.number, note: "Offer " + o.number });
  });
  const total = items.reduce((s, it) => {
    const t = it.unit === "m" ? it.consumed * (it.price || 0) : (it.free ? (it.price || 0) : (it.qty || 0) * (it.price || 0));
    return s + (t || 0);
  }, 0);
  try {
    if (movRows.length) await dbq(db.from("movements").insert(movRows), "Stock not updated");
    await dbq(db.from("offers").update({ items, grand_total: total, total_note: null, stock_deducted: true }).eq("id", id), "Offer not updated");
  } catch { return; }
  closeSheet(); await refreshAll(); renderOffers(); toast("Job closed — total and stock updated");
}

function renderClients() {
  $("cli-list").innerHTML = state.clients.map((c) => `
    <div class="card row" onclick="openClientSheet('${c.id}')">
      <div style="flex:1"><b>${esc(c.name)}</b><div class="muted">${esc(c.contact || "")}</div></div>
    </div>`).join("") || '<p class="muted">No clients.</p>';
}
function openClientSheet(id) {
  const c = id ? state.clients.find((x) => x.id === id) : {};
  openSheet(`
    <h2>${id ? "Edit client" : "New client"}</h2>
    <label>Name / company</label><input id="cl-name" value="${esc(c.name || "")}">
    <label>Contact</label><input id="cl-contact" value="${esc(c.contact || "")}" placeholder="phone / email">
    <label>Note</label><input id="cl-note" value="${esc(c.note || "")}">
    <button class="btn" onclick="saveClient('${id || ""}')">Save</button>
    ${id ? '<div class="sec">Offers</div>' + (state.offers.filter((o) => o.client_id === id).map((o) =>
      `<div class="mov"><span>${o.number} · ${esc(o.title)} · ${STATUS[o.status]}</span><span class="mono">${fmt(o.grand_total)} ден.</span></div>`).join("") || '<p class="muted">No offers yet.</p>') : ""}
  `);
}
async function saveClient(id) {
  const row = { name: $("cl-name").value.trim(), contact: $("cl-contact").value.trim() || null, note: $("cl-note").value.trim() || null };
  if (!row.name) return toast("Enter a name");
  try { await dbq(id ? db.from("clients").update(row).eq("id", id) : db.from("clients").insert(row), "Client not saved"); } catch { return; }
  closeSheet(); await refreshAll(); renderClients(); toast("Saved");
}

function urlB64(s) {
  const pad = "=".repeat((4 - (s.length % 4)) % 4);
  const raw = atob((s + pad).replace(/-/g, "+").replace(/_/g, "/"));
  return Uint8Array.from([...raw].map((c) => c.charCodeAt(0)));
}
async function updatePushState() {
  if (!("Notification" in window)) { $("push-state").textContent = "Not supported"; return; }
  $("push-state").textContent = Notification.permission === "granted" ? "Enabled on this device" : "Disabled";
}
async function enablePush() {
  try {
    const perm = await Notification.requestPermission();
    if (perm !== "granted") return toast("Permission denied");
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlB64(CONFIG.VAPID_PUBLIC_KEY) });
    await db.from("push_subscriptions").upsert({ endpoint: sub.endpoint, sub: sub.toJSON(), user_id: state.uid }, { onConflict: "endpoint" });
    updatePushState(); toast("Notifications enabled");
  } catch (e) { console.error(e); toast("Error enabling push"); }
}
async function saveDigestHour() {
  try { await dbq(db.from("app_settings").update({ value: $("digest-hour").value }).eq("key", "digest_hour"), "Not saved"); } catch { return; }
  toast("Saved");
}

async function qcKey(ev) {
  if (ev.key !== "Enter") return;
  const raw = ev.target.value.trim(); if (!raw) return;
  const t = { title: [], context: "work", due_date: todayStr(), due_time: null };
  for (const w of raw.split(/\s+/)) {
    const lw = w.toLowerCase();
    if (lw === "#work" || lw === "#w") t.context = "work";
    else if (lw === "#elaks" || lw === "#e") t.context = "elaks";
    else if (lw === "#personal" || lw === "#p") t.context = "personal";
    else if (lw === "today") t.due_date = todayStr();
    else if (lw === "tomorrow") { const d = new Date(); d.setDate(d.getDate() + 1); t.due_date = d.toLocaleDateString("sv-SE"); }
    else if (/^\d{1,2}\.\d{1,2}\.?$/.test(lw)) {
      const p = lw.replace(/\.$/, "").split(".");
      const d = new Date(); d.setMonth(parseInt(p[1]) - 1, parseInt(p[0]));
      if (d < new Date(new Date().toDateString())) d.setFullYear(d.getFullYear() + 1);
      t.due_date = d.toLocaleDateString("sv-SE");
    }
    else if (/^\d{1,2}:\d{2}$/.test(lw)) t.due_time = lw.padStart(5, "0");
    else t.title.push(w);
  }
  if (state.role === "employee") t.context = "elaks";
  const row = { title: t.title.join(" "), context: t.context, due_date: t.due_date, due_time: t.due_time, remind: !!t.due_time };
  if (!row.title) return toast("Enter a title");
  try { await dbq(db.from("tasks").insert(row), "Task not saved"); } catch { return; }
  ev.target.value = ""; await refreshAll(); renderToday(); updateBadges(); toast(row.due_time ? "Added · reminder at " + row.due_time : "Added");
}

function updateBadges() {
  const today = todayStr();
  const n = state.tasks.filter((t) =>
    (occursOn(t, today) && !isDoneOn(t, today)) ||
    (!t.recurrence && t.due_date && t.due_date < today && !t.done)).length;
  const low = state.stock.filter((a) => a.min_stock > 0 && a.stock <= a.min_stock).length;
  const set = (name, v) => { const e = $("bdg-" + name); if (e) { e.textContent = v; e.classList.toggle("on", v > 0); } };
  set("today", n); set("inv", low);
}

async function exportCsv(kind) {
  const cell = (v) => '"' + String(v ?? "").replace(/"/g, '""') + '"';
  let rows = [];
  if (kind === "articles") {
    rows = [["name", "code", "category", "unit", "stock", "min_stock", "purchase_price", "sell_price", "supplier"]]
      .concat(state.stock.map((a) => [a.name, a.code, a.category, a.unit, a.stock, a.min_stock, a.purchase_price, a.sell_price, a.supplier]));
  } else if (kind === "movements") {
    let data = [];
    try { data = await dbq(db.from("movements").select("*, articles(name)").order("created_at"), "Export failed"); } catch { return; }
    rows = [["date", "article", "type", "qty", "ref", "note"]]
      .concat((data || []).map((m) => [m.created_at.slice(0, 10), m.articles?.name, m.type, m.qty, m.ref, m.note]));
  } else {
    rows = [["number", "date", "title", "client", "status", "grand_total"]]
      .concat(state.offers.map((o) => [o.number, o.offer_date, o.title, o.clients?.name, o.status, o.grand_total]));
  }
  const csv = rows.map((r) => r.map(cell).join(";")).join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" }));
  a.download = "elaks-" + kind + "-" + todayStr() + ".csv";
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 3000);
}
